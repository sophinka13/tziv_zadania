input: 'aaa,Bbb,aaaa,Bbbb$'
abeceda_mala: ['a','b','c','d','e','f','g']
abeceda_velka: ['A','B','C','D','E','F','G']
abeceda_cisla: [0,1,2,3,4,5,6]
blank: ' '
start state: start
table:
  start:
    ['a','b','c','d','e','f','g']: {L: znak_pre_nasobky}
    ['A','B','C','D','E','F','G']: {L: znak_pre_nasobky}

  znak_pre_nasobky:
    ' ': {write: '#', R: nasobok_zena}
    
  nasobok_zena:
    '#': R
    ['a','b','c','d','e','f','g']: {write: Ăˇ, L: nasobenie_zena}
    ['A','B','C','D','E','F','G']: {R: find_ciarka_zena}
    [Ăˇ, Ăź]: {R: find_ciarka_zena}
    ',': R
    
  nasoboky_muzov_znak:
    ['a','b','c','d','e','f','g']: L
    ['A','B','C','D','E','F','G']: L
    [Ăˇ, Ăź]: L
    '#': L
    ',': L
    1: L
    '@': {L: find_blank}
    ' ': {write: '@', R: nasobok_muz}
    
  nasobok_muz:
    '#': R
    1: R
    ['a','b','c','d','e','f','g']: {R: find_ciarka_muz}
    ['A','B','C','D','E','F','G']: {write: Ăź, L: nasobenie_muz}
    ['Ăˇ', 'Ăź']: {R: find_ciarka_muz}
    ',': R
  
  nasobenie_zena:
    '#': L
    ',': L
    ['a','b','c','d','e','f','g']: L
    ['A','B','C','D','E','F','G']: L
    [Ăˇ, Ăź]: L
    1: L
    ' ': {write: 1, R: find_ciarka_zena}
  
  nasobenie_muz:
    '#': L
    '@': L
    ',': L
    ['a','b','c','d','e','f','g']: L
    ['A','B','C','D','E','F','G']: L
    [Ăˇ, Ăź]: L
    1: L
    ' ': {write: 1, R: find_ciarka_muz}
    
  find_ciarka_zena:
    '#': R
    $: {L: nasoboky_muzov_znak}
    1: R
    [Ăˇ, Ăź]: R
    ['a','b','c','d','e','f','g']: R
    ['A','B','C','D','E','F','G']: R
    ',': {R: nasobok_zena}
    
  find_ciarka_muz:
    '#': R
    '@': R
    $: {L: nasoboky_muzov_znak}
    1: R
    [Ăˇ, Ăź]: R
    ['a','b','c','d','e','f','g']: R
    ['A','B','C','D','E','F','G']: R
    ',': {R: nasobok_muz}
  
  find_blank:
    1: L
    0: L
    ' ': {R: vypocet}
    
  vypocet:
    1: {write: 0, R: find_zavinac}
    '@': {R: to_nasobky}
    
  find_zavinac:
    1: R
    '@': {R: nasobok}
    
  nasobok:
    1: {write: 0, R: prechod_k_vysledku}
    '#': {L: uprava}
  
  prechod_k_vysledku:
    ['a','b','c','d','e','f','g']: R
    ['A','B','C','D','E','F','G']: R
    [Ăˇ, Ăź]: R
    '#': R
    1: R
    $: {R: vysledok}
    ',': R
    
  vysledok:
    ' ': {write: 1, L: back_to_hes}
    1: R
  
  back_to_hes:
    ['a','b','c','d','e','f','g']: L
    ['A','B','C','D','E','F','G']: L
    [Ăˇ, Ăź]: L
    '#': L
    1: L
    $: L
    ',': L
    0: {R: nasobok}
    
  uprava:
    0: {write: 1, L}
    '@': {L: to_zero}
    
  to_zero:
    1: L
    0: {R: vypocet}
    
  to_nasobky:
    1: R
    '#': {R: zmaz}
    
  zmaz:
    [Ăˇ, Ăź]: L
    [1,0,'#','@']: {write: ' ', L}
    ' ': {R: find_zaciatok}
    
  find_zaciatok:
    ' ': R

  modulo0_zena:
    ['a','b','c','d','e','f','g']: {R: modulo1_zena}
    ['A','B','C','D','E','F','G']: {R: modulo1_zena}
    [Ăˇ, Ăź]: {R: modulo1_zena}
    ',': {R: vysledok0_zena}
    '$': {R: vysledok0_zena}

  
  modulo1_zena:
    ['a','b','c','d','e','f','g']: {R: modulo2_zena}
    ['A','B','C','D','E','F','G']: {R: modulo2_zena}
    [Ăˇ, Ăź]: {R: modulo2_zena}
    ',': {R: vysledok1_zena}
    '$': {R: vysledok1_zena}
  
  modulo2_zena:
    ['a','b','c','d','e','f','g']: {R: modulo0_zena}
    ['A','B','C','D','E','F','G']: {R: modulo0_zena}
    ',': {R: vysledok2_zena}
    '$': {R: vysledok2_zena}
    
  vysledok0_zena:
    
  vysledok1_zena:
  
  vysledok2_zena:
    
